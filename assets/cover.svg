<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#f4ede1" />
      <stop offset="100%" stop-color="#e9ddc9" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#vig)" />

  <!-- ink blots, like a few notes painted on paper -->
  <g>
    <circle cx="250" cy="430" r="48" fill="#cc3a3a" opacity="0.78" />
    <circle cx="370" cy="360" r="40" fill="#caa92e" opacity="0.78" />
    <circle cx="470" cy="450" r="44" fill="#2e8b57" opacity="0.78" />
    <circle cx="900" cy="200" r="46" fill="#3a5bcc" opacity="0.72" />
    <circle cx="1000" cy="300" r="38" fill="#7d3ac1" opacity="0.72" />
    <circle cx="820" cy="330" r="34" fill="#c13a8f" opacity="0.72" />
    <circle cx="660" cy="250" r="26" fill="#1f9e8f" opacity="0.7" />
  </g>

  <text x="120" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="96"
    font-weight="700" fill="#3a342c">Paper Listens</text>
  <text x="124" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="40"
    fill="#6b6151">play your music, the paper is listening</text>
</svg>
