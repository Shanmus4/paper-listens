<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="description" content="Play your music, the paper is listening. Turn sound into ink." />
    <meta name="theme-color" content="#f4ede1" />
    <title>Paper Listens</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- The painting surface fills the whole viewport, behind everything. -->
    <canvas id="paper" aria-label="Your painting"></canvas>
    <div class="paper-grain" aria-hidden="true"></div>

    <div id="stage" class="stage">
      <header class="topbar">
        <h1 id="headline" class="headline">
          play your music,<br />
          the paper is listening
          <span class="dots">..</span>
        </h1>

        <div class="controls-wrap">
          <button id="controlsToggle" class="pill" aria-expanded="false" aria-controls="controlsPanel">
            Controls
            <span class="caret" aria-hidden="true">▾</span>
          </button>
          <div id="controlsPanel" class="controls-panel" hidden>
            <div class="panel-row">
              <span class="panel-label">Source</span>
              <div class="segmented" role="group" aria-label="Audio source">
                <button id="srcMic" class="seg seg--on" type="button">Microphone</button>
                <button id="srcFile" class="seg" type="button">Upload file</button>
              </div>
            </div>
            <div id="fileRow" class="panel-row file-row" hidden>
              <span class="panel-label">File</span>
              <span id="fileName" class="file-name">none</span>
            </div>
            <label class="panel-row">
              <span class="panel-label">Sensitivity</span>
              <input id="sensitivity" type="range" min="0" max="100" value="50" />
            </label>
          </div>
          <!-- Hidden native input, triggered by the Upload file button. -->
          <input id="fileInput" type="file" accept="audio/*" hidden />
        </div>
      </header>

      <!-- A small inline hint, shown only if the mic is unavailable/denied. -->
      <p id="micHint" class="mic-hint" hidden>
        Microphone blocked. Allow it in your browser, or upload a file from Controls.
      </p>

      <div class="level-wrap" aria-hidden="true">
        <canvas id="level" width="180" height="48"></canvas>
      </div>

      <div class="actionbar">
        <button id="clearBtn" class="action" type="button">
          <span class="glyph" aria-hidden="true">○</span> New Sheet
        </button>
        <button id="saveBtn" class="action" type="button">
          <span class="glyph" aria-hidden="true">↓</span> Save
        </button>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
